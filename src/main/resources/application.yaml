spring:
  application:
    name: humanizar-nucleo-relacionamento
  config:
    import:
      - optional:file:.env[.properties]
      - optional:classpath:config/rabbitmq-config.yaml

  # Configurações de segurança para Resource Server com JWT
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_SERVER_URL}/oauth2/jwks

  # Configurações do RabbitMQ
  rabbitmq:
    addresses: ${RABBITMQ_URL}
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
      retry:
        enabled: false
    listener:
      simple:
        acknowledge-mode: manual
        default-requeue-rejected: false
        prefetch: 20
        concurrency: 2
        max-concurrency: 8

  # Configurações de DataBase
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: humanizar-programa-atendimento-pool
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 600000
      minimum-idle: 3
      maximum-pool-size: 10

  # Configurações de Migrations
  sql:
    init:
      mode: always

  # Configurações de JPA com Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        "[format_sql]": false
    generate-ddl: true
    open-in-view: false

  # Configurações do Redis para fila de emails
  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379
      password: ${REDIS_PASSWORD}
      database: 0
      timeout: 2000ms

# Server
server:
  port: 9001

# Service Registry - Redis Service Discovery
service:
  registry:
    enabled: true
    ttl: 60
    heartbeat-interval: 30000
    port: 9001

# Configuração do Actuator (Health Check)
management:
  health:
      mail:
        enabled: false
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
      cache:
        time-to-live: 60s
